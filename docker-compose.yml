version: '3.8'

services:
  trin:
    image: portalnetwork/trin:latest
    container_name: trin-node
    command: 
      - "--web3-transport"
      - "http"
      - "--web3-http-address"
      - "http://0.0.0.0:8545"
      - "--enable-metrics-with-url"
      - "0.0.0.0:9005"
      - "--mb"
      - "100000"  # 100GB limit
    ports:
      - "8545:8545"
      - "9005:9005"
    volumes:
      - trin_data:/root/.trin
    restart: unless-stopped
    networks:
      - eth-network

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    user: root # Precisamos ser root temporariamente para criar o arquivo
    entrypoint:
      - /bin/sh
      - -c
      - |
        # Cria a configuração do Prometheus dinamicamente no boot
        cat <<EOF > /etc/prometheus/prometheus.yml
        global:
          scrape_interval: 15s
        scrape_configs:
          - job_name: 'trin'
            static_configs:
              - targets: ['trin:9005']
        EOF
        # Inicia o Prometheus
        exec /bin/prometheus --config.file=/etc/prometheus/prometheus.yml --storage.tsdb.path=/prometheus
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus
    restart: unless-stopped
    networks:
      - eth-network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    restart: unless-stopped
    networks:
      - eth-network

  explorer:
    image: alethio/ethereum-lite-explorer:latest
    container_name: eth-lite-explorer
    environment:
      # Lembre-se de mudar aqui para o domínio/IP que vai apontar para o Trin
      - APP_NODE_URL=http://trin:8545
    ports:
      - "8081:80"
    restart: unless-stopped
    networks:
      - eth-network

volumes:
  trin_data:
  prometheus_data:
  grafana_data:

networks:
  eth-network:
    driver: bridge
